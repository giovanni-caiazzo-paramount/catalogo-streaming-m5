name: Agentic Lock Check

# Fails if any agentic workflow Markdown was changed without re-running
# `gh aw compile`, i.e. the committed *.lock.yml is out of sync with its source.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
      - ".github/aw/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/*.lock.yml"
      - ".github/aw/**"

permissions:
  contents: read

jobs:
  verify-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve gh-aw version from committed lock files
        id: ghaw
        run: |
          # Each *.lock.yml records the compiler that produced it in its
          # line-1 `gh-aw-metadata` header. Verify against that exact version
          # so this check stays correct across gh-aw upgrades with nothing to
          # hand-maintain here.
          ver="$(grep -hoE '"compiler_version":"[^"]+"' .github/workflows/*.lock.yml \
                 | sed -E 's/.*"compiler_version":"([^"]+)".*/\1/' | sort -u)"
          if [ "$(printf '%s\n' "$ver" | grep -c .)" -ne 1 ]; then
            echo "::error::Expected exactly one gh-aw compiler_version across lock files, found: ${ver:-<none>}"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Verifying against gh-aw $ver"

      - name: Install gh-aw extension
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin "${{ steps.ghaw.outputs.version }}"

      - name: Recompile agentic workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh aw compile --no-check-update

      - name: Verify lock files are up to date
        run: |
          # Use `git status --porcelain` rather than `git diff`: a freshly
          # compiled lock file for a brand-new *.md is *untracked*, which
          # `git diff` ignores. status -uall catches modified AND new files.
          changes="$(git status --porcelain --untracked-files=all -- '.github/workflows' '.github/aw')"
          if [ -n "$changes" ]; then
            echo "::error::Agentic lock files are out of date or uncommitted. Run 'gh aw compile' locally and commit the regenerated files."
            echo "$changes"
            exit 1
          fi
